# Curated catalog of pandoc writers this deployment exposes.
#
# This file is the canonical source of truth for the format
# list. tools.yaml's per-format /to/<slug> endpoints are
# checked against it by tests in CI -- editing the catalog
# without updating the YAML (or vice versa) fails before
# merge.
#
# /formats serves this file (converted to JSON on the wire by
# /app/bin/cat-yaml-as-json from the url2code base) so
# consumers can discover supported targets without reading
# the README.
#
# Per-entry fields:
#   slug    URL-safe identifier; becomes the route suffix
#           (/to/<slug>) and is the public name of the
#           target.
#   ext     File extension on the generated download_url.
#           Many slugs share an extension (md / gfm /
#           commonmark all -> .md; html / revealjs / html4
#           all -> .html).
#   writer  pandoc's writer name (passed to ``-t <writer>``);
#           run ``pandoc --list-output-formats`` for the
#           full set.
#   name    Human-readable label (for clients).
#   family  Grouping for documentation. One of:
#             markdown   markdown + lightweight markup
#             document   word-processing / e-book formats
#             web        HTML
#             print      print / typesetting source
#             structured XML / structured-text formats
#             slides     slideshow formats
#             other      catch-all (plain, json AST)
#
# Adding a format:
#   1. Add an entry below.
#   2. Add the matching `to-<slug>` endpoint block to
#      tools.yaml (copy any existing block, change the
#      route, suffix, and the third command arg to the
#      new writer).
# CI fails fast if (1) and (2) drift.

# ===== markdown / lightweight markup =====

- slug: md
  ext: md
  writer: markdown
  name: Markdown (CommonMark + pandoc extensions)
  family: markdown

- slug: gfm
  ext: md
  writer: gfm
  name: GitHub Flavored Markdown
  family: markdown

- slug: commonmark
