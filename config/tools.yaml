# pandoc -- universal document conversion via pandoc CLI.
#
# One route per supported target writer, all under /v1/to/<slug>,
# plus /v1/formats discovery. Source format auto-detected from
# the upload's filename extension; override with the `from` form
# field. Each route returns JSON containing a download_url for
# the converted output.
#
# Per-format details (slug, file extension, pandoc writer name,
# human label, family grouping) live in config/formats.yaml --
# the canonical catalog. tools.yaml's /to/<slug> endpoints are
# checked against it by tests in CI; drift fails before merge.
#
# The wrapper at /app/bin/pandoc-convert handles three pandoc
# quirks (see the wrapper's header comment for the full
# rationale):
#
#   1. Source-format auto-detection from the upload's preserved
#      filename extension; --from / -f overrides via `from`
#      form field.
#   2. stderr -> stdout merge so url2code's text-mode parser
#      surfaces failures.
#   3. Explicit -o for the output path.
#
# `from` and `standalone` are exposed as request flags. 
# `standalone` defaults to true (most consumers want a complete
# document, not a fragment); pass standalone=false for fragments.

api:
  title: pandoc
  version: "1.2.0"
  default_root: /v1

logging:
  level: INFO

endpoints:

  # ====================================================================
  # /formats -- discovery: the writer catalog
  # ====================================================================

  - name: formats
    route: /formats
    method: GET
    description: >-
      Return the curated catalog of supported target formats.
      Each entry is a {slug, ext, writer, name, family} object;
      pass the `slug` field as the path suffix on /to/<slug>.
    command:
      executable: /app/bin/cat-yaml-as-json
      args:
        - "/app/config/formats.yaml"
      timeout_seconds: 5
    output:
      mode: native_json

  # ====================================================================
  # markdown
  # ====================================================================

  - name: to-md
    route: /to/md
    method: POST
    description: >-
      Convert an uploaded document to Markdown (CommonMark + pandoc extensions). Source
      format auto-detected from the upload's filename
      extension; pass form field `from` (e.g. markdown,
      rst, html) to override.
    defaults:
      standalone: "true"
    command:
      executable: /app/bin/pandoc-convert
      args:
        - "{input_path}"
        - "{output_path}"
        - "markdown"
        - '{bibliography_path}'
        - '{csl_path}'
      timeout_seconds: 30
    request:
      flags:
        - name: from
          flag: -f
          type: text
        - name: standalone
          flag: -s
          type: bool
    uploads:
      - field_name: document
        placeholder: input_path
        temp_dir: /tmp/pandoc/uploads
      - field_name: bibliography
        placeholder: bibliography_path
        temp_dir: /tmp/pandoc/uploads
        required: false
      - field_name: csl
        placeholder: csl_path
        temp_dir: /tmp/pandoc/uploads
        required: false
    output_files:
      - placeholder: output_path
        filename_placeholder: output_filename
        output_dir: /tmp/pandoc/outputs
        suffix: .md
    output:
      mode: text

