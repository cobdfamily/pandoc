# Local-dev / production-shape compose for pandoc.
#
# Pulls the published image from kibble by default; override
# PANDOC_TAG to pin a specific version.
#
# pandoc is stateless -- uploads and converted outputs live
# in /tmp/pandoc (created in the Dockerfile, owned by the
# unprivileged runtime user). Container restart wipes them.
#
# To override the curated format catalog without rebuilding,
# bind-mount your own formats.yaml at /app/config/formats.yaml.
#
# The CI E2E suite at tests/test_e2e.py uses a locally-built
# image instead -- see .github/workflows/test.yml.

services:
  pandoc:
    image: kibble.apps.blindhub.ca/cobdfamily/pandoc:${PANDOC_TAG:-latest}
    container_name: pandoc
    ports:
      - "${PANDOC_HTTP_PORT:-8000}:8000"
    # volumes:
    #   - ./formats.yaml:/app/config/formats.yaml:ro
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/', timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    environment:
      # weasyprint (the PDF engine) writes fontconfig / cache
      # files under $HOME; with a read-only root, point HOME at
      # the writable tmpfs. (pandoc's own PDF intermediate is
      # handled by bin/pandoc-convert cd-ing into a tmpfs scratch
      # dir before invoking pandoc.)
      HOME: /tmp
    # Container hardening (fleet standard, matches needle):
    # lock the root filesystem, drop all Linux capabilities,
    # and block privilege escalation. url2code writes uploads
    # and converted outputs under /tmp/pandoc/* (the executor
    # mkdir -p's them per request), so /tmp is a writable
    # tmpfs rather than the read-only root.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
