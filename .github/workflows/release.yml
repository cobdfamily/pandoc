name: release

# Builds and pushes the pandoc container image to the
# kibble registry on every git tag matching v*. Tagged twice
# — by version (v0.1.0 -> 0.1.0) and as latest. Deploy hosts
# pull from kibble.apps.blindhub.ca/cobdfamily/pandoc:<v>.
#
# The kibble registry speaks plain HTTP, so buildkit is
# configured to talk plain HTTP to it. The same config also
# applies to the FROM line in the Dockerfile (which pulls
# cobdfamily/url2code from the same registry).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (eg. v0.1.0)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: kibble.apps.blindhub.ca
  IMAGE: cobdfamily/pandoc

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: derive version (strip leading v)
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: set up qemu (for arm64 cross-emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch matches the fleet; apple-silicon dev
          # boxes pull native arm64.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attach a CycloneDX 1.6 SBOM alongside the image in
      # kibble via the OCI 1.1 referrers API. syft against a
      # locally-loaded single-arch build (the multi-arch push
      # above can't load into the docker daemon; we rebuild
      # amd64 with the gha cache so it's near-free). Matches
      # the syft variant used in this repo's sbom.yml. See
      # state-of-the-stack-2026-05-20 Part X step 2.
      - name: build single-arch image for SBOM scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: cobdfamily-sbom:scan
          cache-from: type=gha
      - name: generate CycloneDX SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: cobdfamily-sbom:scan
          format: cyclonedx-json
          output-file: bom.cdx.json
      - name: install oras
        uses: oras-project/setup-oras@v1
      - name: attach SBOM as OCI 1.1 referrer
        run: |
          oras attach \
            --artifact-type application/vnd.cyclonedx+json \
            --plain-http \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }} \
            bom.cdx.json:application/vnd.cyclonedx+json

      - name: summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:latest\`"
            echo ""
            echo "### SBOM attached (syft scan of single-arch build)"
            echo ""
            echo "- artifact-type \`application/vnd.cyclonedx+json\`"
            echo "- discover via:"
            echo "  \`oras discover --plain-http ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
